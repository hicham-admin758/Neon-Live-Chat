kind = "web"
previewPath = "/"
title = "خلية البطولات"
version = "1.0.0"
id = "artifacts/brackets"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 18148

[services.development]
run = "pnpm --filter @workspace/brackets run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/brackets", "run", "build" ]
publicDir = "artifacts/brackets/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "18148"
BASE_PATH = "/"
